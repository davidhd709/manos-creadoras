version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ingenierohenrydavid_db_user
      MONGO_INITDB_ROOT_PASSWORD: Hd123456
      MONGO_INITDB_DATABASE: manos-creadoras
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      MONGO_URI: mongodb://ingenierohenrydavid_db_user:Hd123456@mongodb:27017/manos-creadoras?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-cambia_este_secreto_en_produccion_min_32_chars}
      PORT: 3000
      FRONTEND_URL: http://localhost
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
