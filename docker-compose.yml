services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/docs', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
